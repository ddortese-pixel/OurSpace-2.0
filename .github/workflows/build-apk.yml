name: Build OurSpace 2.0 APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install React Native CLI
        run: npm install -g react-native@0.75.4 @react-native-community/cli

      - name: Scaffold a fresh RN project named OurSpace
        run: |
          cd /tmp
          npx @react-native-community/cli@latest init OurSpace --version 0.75.4 --skip-install --skip-git-init
          echo "Scaffold complete"

      - name: Copy our source files over the scaffold
        run: |
          # Overwrite JS layer with our custom files
          cp -r $GITHUB_WORKSPACE/rn/src       /tmp/OurSpace/
          cp    $GITHUB_WORKSPACE/rn/App.js    /tmp/OurSpace/App.js
          cp    $GITHUB_WORKSPACE/rn/index.js  /tmp/OurSpace/index.js

      - name: Merge package.json dependencies
        run: |
          cd /tmp/OurSpace
          # Install all deps from our package.json on top of the scaffold
          npm install --save \
            @react-native-async-storage/async-storage@^1.23.1 \
            @react-native-community/netinfo@^11.3.1 \
            @notifee/react-native@^9.1.0 \
            react-native-callkeep@^4.3.11

      - name: Install all npm deps
        working-directory: /tmp/OurSpace
        run: npm install

      - name: Add AndroidManifest permissions & services
        run: |
          MANIFEST="/tmp/OurSpace/android/app/src/main/AndroidManifest.xml"
          # Inject permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL" />
    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />
    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />
    <uses-permission android:name="android.permission.READ_PHONE_STATE" />
    <uses-permission android:name="android.permission.CALL_PHONE" />
    <uses-permission android:name="android.permission.MANAGE_OWN_CALLS" />
</manifest>|' "$MANIFEST"
          # Inject services before </application>
          sed -i 's|</application>|    <service android:name="app.notifee.core.ForegroundService" android:foregroundServiceType="phoneCall" android:exported="false" />
    <service android:name="io.wazo.callkeep.VoiceConnectionService" android:label="OurSpace" android:permission="android.permission.BIND_TELECOM_CONNECTION_SERVICE" android:exported="true"><intent-filter><action android:name="android.telecom.ConnectionService" /></intent-filter></service>
</application>|' "$MANIFEST"
          echo "Manifest updated"
          cat "$MANIFEST"

      - name: Make gradlew executable
        working-directory: /tmp/OurSpace/android
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('/tmp/OurSpace/android/**/*.gradle*') }}

      - name: Build Debug APK
        working-directory: /tmp/OurSpace/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Locate APK
        id: apk
        run: |
          APK=$(find /tmp/OurSpace/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "APK path: $APK"
          ls -lh "$APK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ourspace-2.0-debug-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14
