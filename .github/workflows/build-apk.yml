name: Build OurSpace 2.0 APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create RN project using template (non-interactive)
        run: |
          npx --yes react-native@0.75.4 init OurSpace             --template react-native-template-typescript             --directory /tmp/OurSpace             --skip-install             --version 0.75.4             --npm             --no-telemetry             2>&1 || true
          # Verify android dir was created
          if [ ! -d "/tmp/OurSpace/android" ]; then
            echo "Scaffold failed, using yarn create approach..."
            cd /tmp
            npm_config_yes=true npx @react-native-community/cli@12 init OurSpace               --version 0.75.4               --skip-install               --directory /tmp/OurSpace2 2>&1 || true
            # last resort: clone from official template
            git clone --depth 1 https://github.com/facebook/react-native.git /tmp/rn-repo
            cp -r /tmp/rn-repo/template /tmp/OurSpace
            # rename the template app
            find /tmp/OurSpace -type f \( -name "*.json" -o -name "*.xml" -o -name "*.java" -o -name "*.gradle" -o -name "*.swift" \)               -exec sed -i 's/HelloWorld/OurSpace/g; s/helloworld/ourspace/g' {} +
          fi
          echo "Android dir check:"
          ls /tmp/OurSpace/android/ 2>/dev/null || echo "NOT FOUND"

      - name: Overlay our JS source files
        run: |
          cp -r $GITHUB_WORKSPACE/rn/src /tmp/OurSpace/
          cp $GITHUB_WORKSPACE/rn/App.js /tmp/OurSpace/App.js
          cp $GITHUB_WORKSPACE/rn/index.js /tmp/OurSpace/index.js

      - name: Install JS dependencies
        working-directory: /tmp/OurSpace
        run: |
          npm install
          npm install --save             @react-native-async-storage/async-storage             @react-native-community/netinfo             @notifee/react-native             react-native-callkeep

      - name: Add extra AndroidManifest permissions
        run: |
          M="/tmp/OurSpace/android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL"/>\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>\n    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT"/>\n    <uses-permission android:name="android.permission.READ_PHONE_STATE"/>\n    <uses-permission android:name="android.permission.MANAGE_OWN_CALLS"/>\n</manifest>|' "$M"
          sed -i 's|</application>|    <service android:name="app.notifee.core.ForegroundService" android:foregroundServiceType="phoneCall" android:exported="false"/>\n</application>|' "$M"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: /tmp/OurSpace/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: /tmp/OurSpace/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ourspace-2.0-debug-apk
          path: /tmp/OurSpace/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
