name: Build OurSpace 2.0 APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: rn/package.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS deps
        working-directory: rn
        run: npm install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('rn/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Chmod gradlew
        working-directory: rn/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: rn/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ourspace-2.0-debug-apk
          path: rn/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Print build summary
        run: |
          APK="rn/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "Build complete"
          if [ -f "$APK" ]; then
            echo "APK size: $(du -sh $APK | cut -f1)"
          fi
