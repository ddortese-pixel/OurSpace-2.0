name: Build OurSpace 2.0 APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rn/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold React Native 0.75.4 project
        run: |
          npx @react-native-community/cli@15 init OurSpace --version 0.75.4 --skip-install --skip-git-init 2>&1 | tail -30
          echo "--- scaffold result ---"
          ls OurSpace/ || echo "ERROR: OurSpace dir missing"

      - name: Overlay our source
        run: |
          cp rn/index.js     OurSpace/index.js
          cp rn/App.js       OurSpace/App.js
          cp rn/package.json OurSpace/package.json
          mkdir -p OurSpace/src
          cp -r rn/src/. OurSpace/src/
          echo "Overlay complete:"
          ls OurSpace/src/

      - name: Install JS dependencies
        working-directory: OurSpace
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('OurSpace/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: OurSpace/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OurSpace2.0-Debug-APK
          path: OurSpace/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
