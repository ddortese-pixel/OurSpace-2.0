name: Build OurSpace 2.0 APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rn/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rn/package.json

      - name: Install JS Dependencies
        working-directory: rn
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: rn/android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('rn/android/**/*.gradle*', 'rn/android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: rn/android
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OurSpace2.0-Debug-APK
          path: rn/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
